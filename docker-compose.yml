services:

  frontend:

    build: ./frontend

    container_name: frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    networks:
      - frontend-net


  backend:

    build: ./backend

    container_name: backend

    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb
      REDIS_HOST: redis

    depends_on:
      - mysql
      - redis

    networks:
      - frontend-net
      - backend-net


  mysql:

    image: mysql:8

    container_name: mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: appdb

    volumes:
      - mysql-data:/var/lib/mysql

    networks:
      - backend-net


  redis:

    image: redis:latest

    container_name: redis

    restart: always

    networks:
      - backend-net


volumes:

  mysql-data:


networks:

  frontend-net:

  backend-net: